      # ── State persistence ─────────────────────────────────────────────────
      #
      # Records the SHA for each module that succeeded (or was SKIPped, meaning
      # its cached artifact is still valid). Failed modules keep their previous
      # SHA so the next run retries them.

      - name: Save build state
        if: always()
        env:
          SHA_PARENT: ${{ steps.shas.outputs.sha_parent }}
          SHA_PLATFORM: ${{ steps.shas.outputs.sha_platform }}
          SHA_LEDGER: ${{ steps.shas.outputs.sha_ledger }}
          SHA_EIDOS: ${{ steps.shas.outputs.sha_eidos }}
          SHA_CONNECTORS: ${{ steps.shas.outputs.sha_connectors }}
          SHA_WORK: ${{ steps.shas.outputs.sha_work }}
          SHA_QHORUS: ${{ steps.shas.outputs.sha_qhorus }}
          SHA_ENGINE: ${{ steps.shas.outputs.sha_engine }}
          SHA_CLAUDONY: ${{ steps.shas.outputs.sha_claudony }}
          SHA_DEVTOWN: ${{ steps.shas.outputs.sha_devtown }}
          SHA_AML: ${{ steps.shas.outputs.sha_aml }}
          SHA_CLINICAL: ${{ steps.shas.outputs.sha_clinical }}
          SHA_DRAFTHOUSE: ${{ steps.shas.outputs.sha_drafthouse }}
          SHA_QUARKMIND: ${{ steps.shas.outputs.sha_quarkmind }}
          PREV_PARENT: ${{ steps.prev.outputs.sha_parent }}
          PREV_PLATFORM: ${{ steps.prev.outputs.sha_platform }}
          PREV_LEDGER: ${{ steps.prev.outputs.sha_ledger }}
          PREV_EIDOS: ${{ steps.prev.outputs.sha_eidos }}
          PREV_CONNECTORS: ${{ steps.prev.outputs.sha_connectors }}
          PREV_WORK: ${{ steps.prev.outputs.sha_work }}
          PREV_QHORUS: ${{ steps.prev.outputs.sha_qhorus }}
          PREV_ENGINE: ${{ steps.prev.outputs.sha_engine }}
          PREV_CLAUDONY: ${{ steps.prev.outputs.sha_claudony }}
          PREV_DEVTOWN: ${{ steps.prev.outputs.sha_devtown }}
          PREV_AML: ${{ steps.prev.outputs.sha_aml }}
          PREV_CLINICAL: ${{ steps.prev.outputs.sha_clinical }}
          PREV_DRAFTHOUSE: ${{ steps.prev.outputs.sha_drafthouse }}
          PREV_QUARKMIND: ${{ steps.prev.outputs.sha_quarkmind }}
          INCLUDE_APPLICATIONS: ${{ inputs.include_applications }}
          OUTCOME_PLATFORM: ${{ steps.platform.outcome }}
          OUTCOME_LEDGER: ${{ steps.ledger.outcome }}
          OUTCOME_EIDOS: ${{ steps.eidos.outcome }}
          OUTCOME_CONNECTORS: ${{ steps.connectors.outcome }}
          OUTCOME_WORK: ${{ steps.work.outcome }}
          OUTCOME_QHORUS: ${{ steps.qhorus.outcome }}
          OUTCOME_ENGINE: ${{ steps.engine.outcome }}
          OUTCOME_CLAUDONY: ${{ steps.claudony.outcome }}
          OUTCOME_DEVTOWN: ${{ steps.devtown.outcome }}
          OUTCOME_AML: ${{ steps.aml.outcome }}
          OUTCOME_CLINICAL: ${{ steps.clinical.outcome }}
          OUTCOME_QUARKMIND: ${{ steps.quarkmind.outcome }}
        run: |
          mkdir -p .incremental-state

          # Helper: on success record current SHA; on failure keep previous SHA
          # so the next run retries. Parent always uses current SHA (no outcome to check).
          record() {
            local name=$1 cur=$2 prev=$3 outcome=$4
            if [ "$outcome" = "success" ]; then echo "${name}=${cur}"
            else echo "${name}=${prev:-none}"
            fi
          }

          {
            echo "parent=${SHA_PARENT}"
            record platform   "$SHA_PLATFORM"   "${PREV_PLATFORM:-none}"   "$OUTCOME_PLATFORM"
            record ledger     "$SHA_LEDGER"     "${PREV_LEDGER:-none}"     "$OUTCOME_LEDGER"
            record eidos      "$SHA_EIDOS"      "${PREV_EIDOS:-none}"      "$OUTCOME_EIDOS"
            record connectors "$SHA_CONNECTORS" "${PREV_CONNECTORS:-none}" "$OUTCOME_CONNECTORS"
            record work       "$SHA_WORK"       "${PREV_WORK:-none}"       "$OUTCOME_WORK"
            record qhorus     "$SHA_QHORUS"     "${PREV_QHORUS:-none}"     "$OUTCOME_QHORUS"
            record engine     "$SHA_ENGINE"     "${PREV_ENGINE:-none}"     "$OUTCOME_ENGINE"
            record claudony   "$SHA_CLAUDONY"   "${PREV_CLAUDONY:-none}"   "$OUTCOME_CLAUDONY"
            if [ "$INCLUDE_APPLICATIONS" = "true" ]; then
              record devtown    "$SHA_DEVTOWN"    "${PREV_DEVTOWN:-none}"    "$OUTCOME_DEVTOWN"
              record aml        "$SHA_AML"        "${PREV_AML:-none}"        "$OUTCOME_AML"
              record clinical   "$SHA_CLINICAL"   "${PREV_CLINICAL:-none}"   "$OUTCOME_CLINICAL"
              record drafthouse "$SHA_DRAFTHOUSE" "${PREV_DRAFTHOUSE:-none}" "$OUTCOME_DRAFTHOUSE"
              record quarkmind  "$SHA_QUARKMIND"  "${PREV_QUARKMIND:-none}"  "$OUTCOME_QUARKMIND"
            fi
          } > .incremental-state/shas.txt

          echo "State saved:"
          cat .incremental-state/shas.txt

      - name: Persist build state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .incremental-state
          key: incremental-state-${{ github.ref_name }}-${{ github.run_id }}

      # ── Summary ───────────────────────────────────────────────────────────

      - name: Build summary
        if: always()
        env:
          ACTOR: ${{ github.actor }}
          SKIP_TESTS: ${{ inputs.skip_tests }}
          SKIP_ITS: ${{ inputs.skip_integration_tests }}
          FORCE_REBUILD: ${{ inputs.force_rebuild }}
          DECISION_PLATFORM: ${{ steps.platform.outputs.decision }}
          DECISION_LEDGER: ${{ steps.ledger.outputs.decision }}
          DECISION_EIDOS: ${{ steps.eidos.outputs.decision }}
          DECISION_CONNECTORS: ${{ steps.connectors.outputs.decision }}
          DECISION_WORK: ${{ steps.work.outputs.decision }}
          DECISION_QHORUS: ${{ steps.qhorus.outputs.decision }}
          DECISION_ENGINE: ${{ steps.engine.outputs.decision }}
          DECISION_CLAUDONY: ${{ steps.claudony.outputs.decision }}
          DECISION_DEVTOWN: ${{ steps.devtown.outputs.decision }}
          DECISION_AML: ${{ steps.aml.outputs.decision }}
          DECISION_CLINICAL: ${{ steps.clinical.outputs.decision }}
          DECISION_DRAFTHOUSE: ${{ steps.drafthouse.outputs.decision }}
          DECISION_QUARKMIND: ${{ steps.quarkmind.outputs.decision }}
          INCLUDE_APPLICATIONS: ${{ inputs.include_applications }}
          OUTCOME_PLATFORM: ${{ steps.platform.outcome }}
          OUTCOME_LEDGER: ${{ steps.ledger.outcome }}
          OUTCOME_EIDOS: ${{ steps.eidos.outcome }}
          OUTCOME_CONNECTORS: ${{ steps.connectors.outcome }}
          OUTCOME_WORK: ${{ steps.work.outcome }}
          OUTCOME_QHORUS: ${{ steps.qhorus.outcome }}
          OUTCOME_ENGINE: ${{ steps.engine.outcome }}
          OUTCOME_CLAUDONY: ${{ steps.claudony.outcome }}
          OUTCOME_DEVTOWN: ${{ steps.devtown.outcome }}
          OUTCOME_AML: ${{ steps.aml.outcome }}
          OUTCOME_CLINICAL: ${{ steps.clinical.outcome }}
          OUTCOME_DRAFTHOUSE: ${{ steps.drafthouse.outcome }}
          OUTCOME_QUARKMIND: ${{ steps.quarkmind.outcome }}
        run: |
          if [ "$SKIP_TESTS" = "true" ]; then
            TEST_MODE="compile check only"
          elif [ "$SKIP_ITS" = "true" ]; then
            TEST_MODE="unit tests only"
          else
            TEST_MODE="full test suite"
          fi
          [ "$FORCE_REBUILD" = "true" ] && TEST_MODE="$TEST_MODE — forced rebuild"

          MODULES=(platform ledger eidos connectors work qhorus engine claudony)
          [ "$INCLUDE_APPLICATIONS" = "true" ] && MODULES+=(devtown aml clinical drafthouse quarkmind)
          declare -A DECISIONS=(
            [platform]="$DECISION_PLATFORM"
            [ledger]="$DECISION_LEDGER"
            [eidos]="$DECISION_EIDOS"
            [connectors]="$DECISION_CONNECTORS"
            [work]="$DECISION_WORK"
            [qhorus]="$DECISION_QHORUS"
            [engine]="$DECISION_ENGINE"
            [claudony]="$DECISION_CLAUDONY"
            [devtown]="$DECISION_DEVTOWN"
            [aml]="$DECISION_AML"
            [clinical]="$DECISION_CLINICAL"
            [drafthouse]="$DECISION_DRAFTHOUSE"
            [quarkmind]="$DECISION_QUARKMIND"
          )
          declare -A OUTCOMES=(
            [platform]="$OUTCOME_PLATFORM"
            [ledger]="$OUTCOME_LEDGER"
            [eidos]="$OUTCOME_EIDOS"
            [connectors]="$OUTCOME_CONNECTORS"
            [work]="$OUTCOME_WORK"
            [qhorus]="$OUTCOME_QHORUS"
            [engine]="$OUTCOME_ENGINE"
            [claudony]="$OUTCOME_CLAUDONY"
            [devtown]="$OUTCOME_DEVTOWN"
            [aml]="$OUTCOME_AML"
            [clinical]="$OUTCOME_CLINICAL"
            [drafthouse]="$OUTCOME_DRAFTHOUSE"
            [quarkmind]="$OUTCOME_QUARKMIND"
          )

          {
            echo "# Incremental Full Stack Build"
            echo ""
            echo "_Triggered by @${ACTOR} &nbsp;|&nbsp; $(date -u '+%Y-%m-%d %H:%M UTC') &nbsp;|&nbsp; ${TEST_MODE}_"
            echo ""
            echo "| Module | Decision | Result | Duration |"
            echo "|:-------|:--------:|:------:|:--------:|"
          } >> "$GITHUB_STEP_SUMMARY"

          FAIL_COUNT=0
          for module in "${MODULES[@]}"; do
            decision="${DECISIONS[$module]:-—}"
            outcome="${OUTCOMES[$module]}"
            duration=$(cat ".build-times/$module" 2>/dev/null || true)
            [ -n "$duration" ] && duration="${duration}s" || duration="—"

            case "$outcome" in
              success)  icon="✅" ;;
              failure)  icon="❌"; FAIL_COUNT=$((FAIL_COUNT + 1)) ;;
              skipped)  icon="⚠️ skipped"; FAIL_COUNT=$((FAIL_COUNT + 1)) ;;
              *)        icon="—" ;;
            esac

            repo_org="casehubio"
            [ "$module" = "quarkmind" ] && repo_org="mdproctor"
            echo "| [$module](https://github.com/$repo_org/$module) | $decision | $icon | $duration |" \
              >> "$GITHUB_STEP_SUMMARY"
          done

          {
            echo ""
            if [ "$FAIL_COUNT" -eq 0 ]; then
              echo "✅ **All modules passed.**"
            else
              echo "❌ **$FAIL_COUNT module(s) failed.**"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$FAIL_COUNT" -gt 0 ]; then
            echo "::error::$FAIL_COUNT module(s) failed in the incremental full stack build."
            exit 1
          fi
