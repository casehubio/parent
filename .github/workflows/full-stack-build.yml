name: Full Stack Build

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      skip_tests:
        description: "Skip all tests (compile check only)"
        required: false
        default: false
        type: boolean
      skip_integration_tests:
        description: "Skip integration tests only (unit tests still run)"
        required: false
        default: false
        type: boolean
      maven_args:
        description: Extra Maven args (e.g. -T 1C)
        required: false
        default: ''
        type: string
      include_applications:
        description: "Include application repos (devtown, aml, clinical) — off by default"
        required: false
        default: false
        type: boolean

jobs:
  build:
    name: Full Stack Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-fullstack-${{ hashFiles('pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-fullstack-
            ${{ runner.os }}-maven-

      - name: Clone repositories
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          INCLUDE_APPLICATIONS: ${{ inputs.include_applications }}
        run: |
          mkdir -p .build-times casehub
          # Special-case repo mappings (name differs from casehubio/<name> convention)
          declare -A REPO_OVERRIDE=([pages]="casehubio/casehub-pages")
          declare -A TOKEN_OVERRIDE=([quarkmind]="$GH_TOKEN" [flow]="$GH_TOKEN")
          clone_csv() {
            local csv=$1
            while IFS=',' read -r name _rest; do
              [[ "$name" =~ ^#|^$ ]] && continue
              local token="${TOKEN_OVERRIDE[$name]:-$GITHUB_TOKEN}"
              local repo="${REPO_OVERRIDE[$name]:-casehubio/$name}"
              git clone --quiet "https://x-access-token:${token}@github.com/${repo}.git" "casehub/$name"
            done < "$csv"
          }
          clone_csv build/modules-core.csv
          [ "$INCLUDE_APPLICATIONS" = "true" ] && clone_csv build/modules-applications.csv

      # continue-on-error: true ensures all steps run and we get per-module outcomes

      # -- BEGIN GENERATED

      - name: "Build: platform"
        id: platform
        continue-on-error: true
        env:
          SKIP_TESTS: ${{ inputs.skip_tests }}
          SKIP_ITS: ${{ inputs.skip_integration_tests }}
          MAVEN_EXTRA: ${{ inputs.maven_args }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p .build-outcomes
          FLAGS=""
          [ "$SKIP_TESTS" = "true" ] && FLAGS="-DskipTests"
          [ "$SKIP_ITS" = "true" ] && FLAGS="$FLAGS -DskipITs"
          START=$SECONDS
          if cd casehub/platform && mvn install --batch-mode $FLAGS $MAVEN_EXTRA; then
            echo "success" > ../../.build-outcomes/platform
          else
            echo "failure" > ../../.build-outcomes/platform
          fi
          echo $((SECONDS - START)) > ../../.build-times/platform

