      # -- END GENERATED


      - name: Build summary
        if: always()
        env:
          ACTOR: ${{ github.actor }}
          SKIP_TESTS: ${{ inputs.skip_tests }}
          SKIP_ITS: ${{ inputs.skip_integration_tests }}
          INCLUDE_APPLICATIONS: ${{ inputs.include_applications }}
        run: |
          if [ "$SKIP_TESTS" = "true" ]; then
            TEST_MODE="compile check only (all tests skipped)"
          elif [ "$SKIP_ITS" = "true" ]; then
            TEST_MODE="unit tests only (integration tests skipped)"
          else
            TEST_MODE="full test suite"
          fi

          declare -A REPO_OVERRIDE=([pages]="casehubio/casehub-pages")
          declare -A ORG_OVERRIDE=([quarkmind]="mdproctor" [flow]="mdproctor")

          # Module list and outcomes both driven from CSV + .build-outcomes/ files
          MODULES=()
          read_csv_names() {
            while IFS=',' read -r name _rest; do
              [[ "$name" =~ ^#|^$ ]] && continue
              MODULES+=("$name")
            done < "$1"
          }
          read_csv_names build/modules-core.csv
          [ "$INCLUDE_APPLICATIONS" = "true" ] && read_csv_names build/modules-applications.csv

          {
            echo "# Full Stack Build"
            echo ""
            echo "_Triggered by @${ACTOR} &nbsp;|&nbsp; $(date -u '+%Y-%m-%d %H:%M UTC') &nbsp;|&nbsp; ${TEST_MODE}_"
            echo ""
            echo "| Module | Result | Duration |"
            echo "|:-------|:------:|:--------:|"
          } >> "$GITHUB_STEP_SUMMARY"

          FAIL_COUNT=0
          for module in "${MODULES[@]}"; do
            outcome=$(cat ".build-outcomes/$module" 2>/dev/null || echo "skipped")
            repo_name="${REPO_OVERRIDE[$module]:-${ORG_OVERRIDE[$module]:-casehubio}/$module}"
            duration=$(cat ".build-times/$module" 2>/dev/null || true)
            [ -n "$duration" ] && duration="${duration}s" || duration="—"

            case "$outcome" in
              success)  icon="✅" ;;
              failure)  icon="❌"; FAIL_COUNT=$((FAIL_COUNT + 1)) ;;
              *)        icon="⏭️"; FAIL_COUNT=$((FAIL_COUNT + 1)) ;;
            esac

            echo "| [$module](https://github.com/$repo_name) | $icon $outcome | $duration |" \
              >> "$GITHUB_STEP_SUMMARY"
          done

          {
            echo ""
            if [ "$FAIL_COUNT" -eq 0 ]; then
              echo "✅ **All modules built successfully.**"
            else
              echo "❌ **$FAIL_COUNT module(s) failed or were skipped.**"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$FAIL_COUNT" -gt 0 ]; then
            echo "::error::$FAIL_COUNT module(s) failed in the full stack build."
            exit 1
          fi

      - name: "Sync casehub-all to build SHAs"
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          INCLUDE_APPLICATIONS: ${{ inputs.include_applications }}
          TRIGGER: ${{ github.event_name }}
        run: |
          cat > /tmp/dispatch_casehub_all.py << 'PYEOF'
          import subprocess, json, os, sys

          def sha(path):
              try:
                  return subprocess.check_output(
                      ['git', '-C', path, 'rev-parse', 'HEAD']
                  ).decode().strip()
              except Exception:
                  return ''

          include_apps = os.environ.get('INCLUDE_APPLICATIONS', 'false') == 'true'
          parent_sha = subprocess.check_output(['git', 'rev-parse', 'HEAD']).decode().strip()

          def load_csv(path):
              modules = []
              with open(path) as f:
                  for line in f:
                      line = line.strip()
                      if not line or line.startswith('#'):
                          continue
                      modules.append(line.split(',')[0])
              return modules

          core_modules = load_csv('build/modules-core.csv')
          app_modules  = load_csv('build/modules-applications.csv')
          active = core_modules + (app_modules if include_apps else [])

          shas = {'sha_parent': parent_sha}
          for name in active:
              key = 'sha_' + name.replace('-', '_')
              shas[key] = sha(f'casehub/{name}')

          payload = {
              'event_type': 'ecosystem-build-succeeded',
              'client_payload': {
                  'trigger': os.environ.get('TRIGGER', 'workflow_dispatch'),
                  **shas,
              }
          }

          result = subprocess.run(
              ['gh', 'api', 'repos/casehubio/casehub-all/dispatches', '--input', '-'],
              input=json.dumps(payload).encode(),
              check=True,
              env=os.environ.copy()
          )
          print('casehub-all dispatch sent — SHAs captured at build time.')
          PYEOF
          python3 /tmp/dispatch_casehub_all.py
