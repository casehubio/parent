name: Full Stack Build

on:
  workflow_dispatch:
    inputs:
      skip_tests:
        description: Skip tests
        required: false
        default: false
        type: boolean
      maven_args:
        description: Extra Maven args (e.g. -T 1C)
        required: false
        default: ''
        type: string

jobs:
  build:
    name: Full Stack Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-fullstack-${{ hashFiles('pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-fullstack-
            ${{ runner.os }}-maven-

      - name: Clone repositories
        run: |
          mkdir -p .build-times
          for repo in quarkus-langchain4j quarkus-ledger quarkus-work quarkus-qhorus casehub-engine claudony; do
            git clone --quiet "https://github.com/casehubio/$repo.git"
          done

      - name: "Build: quarkus-langchain4j"
        id: langchain4j
        env:
          SKIP_TESTS: ${{ inputs.skip_tests }}
          MAVEN_EXTRA: ${{ inputs.maven_args }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FLAGS=""; [ "$SKIP_TESTS" = "true" ] && FLAGS="-DskipTests"
          START=$SECONDS
          mvn install -f aggregator.xml -pl quarkus-langchain4j --batch-mode $FLAGS $MAVEN_EXTRA
          echo $((SECONDS - START)) > .build-times/quarkus-langchain4j

      - name: "Build: quarkus-ledger"
        id: ledger
        env:
          SKIP_TESTS: ${{ inputs.skip_tests }}
          MAVEN_EXTRA: ${{ inputs.maven_args }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FLAGS=""; [ "$SKIP_TESTS" = "true" ] && FLAGS="-DskipTests"
          START=$SECONDS
          mvn install -f aggregator.xml -pl quarkus-ledger --batch-mode $FLAGS $MAVEN_EXTRA
          echo $((SECONDS - START)) > .build-times/quarkus-ledger

      - name: "Build: quarkus-work"
        id: work
        env:
          SKIP_TESTS: ${{ inputs.skip_tests }}
          MAVEN_EXTRA: ${{ inputs.maven_args }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FLAGS=""; [ "$SKIP_TESTS" = "true" ] && FLAGS="-DskipTests"
          START=$SECONDS
          mvn install -f aggregator.xml -pl quarkus-work --batch-mode $FLAGS $MAVEN_EXTRA
          echo $((SECONDS - START)) > .build-times/quarkus-work

      - name: "Build: quarkus-qhorus"
        id: qhorus
        env:
          SKIP_TESTS: ${{ inputs.skip_tests }}
          MAVEN_EXTRA: ${{ inputs.maven_args }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FLAGS=""; [ "$SKIP_TESTS" = "true" ] && FLAGS="-DskipTests"
          START=$SECONDS
          mvn install -f aggregator.xml -pl quarkus-qhorus --batch-mode $FLAGS $MAVEN_EXTRA
          echo $((SECONDS - START)) > .build-times/quarkus-qhorus

      - name: "Build: casehub-engine"
        id: engine
        env:
          SKIP_TESTS: ${{ inputs.skip_tests }}
          MAVEN_EXTRA: ${{ inputs.maven_args }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FLAGS=""; [ "$SKIP_TESTS" = "true" ] && FLAGS="-DskipTests"
          START=$SECONDS
          mvn install -f aggregator.xml -pl casehub-engine --batch-mode $FLAGS $MAVEN_EXTRA
          echo $((SECONDS - START)) > .build-times/casehub-engine

      - name: "Build: claudony"
        id: claudony
        env:
          SKIP_TESTS: ${{ inputs.skip_tests }}
          MAVEN_EXTRA: ${{ inputs.maven_args }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FLAGS=""; [ "$SKIP_TESTS" = "true" ] && FLAGS="-DskipTests"
          START=$SECONDS
          mvn install -f aggregator.xml -pl claudony --batch-mode $FLAGS $MAVEN_EXTRA
          echo $((SECONDS - START)) > .build-times/claudony

      - name: Build summary
        if: always()
        env:
          ACTOR: ${{ github.actor }}
          OUTCOME_LANGCHAIN4J: ${{ steps.langchain4j.outcome }}
          OUTCOME_LEDGER: ${{ steps.ledger.outcome }}
          OUTCOME_WORK: ${{ steps.work.outcome }}
          OUTCOME_QHORUS: ${{ steps.qhorus.outcome }}
          OUTCOME_ENGINE: ${{ steps.engine.outcome }}
          OUTCOME_CLAUDONY: ${{ steps.claudony.outcome }}
        run: |
          MODULES=(quarkus-langchain4j quarkus-ledger quarkus-work quarkus-qhorus casehub-engine claudony)
          declare -A OUTCOMES=(
            [quarkus-langchain4j]="$OUTCOME_LANGCHAIN4J"
            [quarkus-ledger]="$OUTCOME_LEDGER"
            [quarkus-work]="$OUTCOME_WORK"
            [quarkus-qhorus]="$OUTCOME_QHORUS"
            [casehub-engine]="$OUTCOME_ENGINE"
            [claudony]="$OUTCOME_CLAUDONY"
          )

          {
            echo "# Full Stack Build"
            echo ""
            echo "_Triggered by @${ACTOR} &nbsp;|&nbsp; $(date -u '+%Y-%m-%d %H:%M UTC')_"
            echo ""
            echo "| Module | Result | Duration |"
            echo "|:-------|:------:|:--------:|"
          } >> "$GITHUB_STEP_SUMMARY"

          FAIL_COUNT=0
          for module in "${MODULES[@]}"; do
            outcome="${OUTCOMES[$module]}"
            duration=$(cat ".build-times/$module" 2>/dev/null || true)
            [ -n "$duration" ] && duration="${duration}s" || duration="—"

            case "$outcome" in
              success)  icon="✅" ;;
              failure)  icon="❌"; FAIL_COUNT=$((FAIL_COUNT + 1)) ;;
              skipped)  icon="⏭️" ;;
              *)        icon="⚠️"; FAIL_COUNT=$((FAIL_COUNT + 1)) ;;
            esac

            echo "| [$module](https://github.com/casehubio/$module) | $icon $outcome | $duration |" \
              >> "$GITHUB_STEP_SUMMARY"
          done

          {
            echo ""
            if [ "$FAIL_COUNT" -eq 0 ]; then
              echo "✅ **All modules built successfully.**"
            else
              echo "❌ **$FAIL_COUNT module(s) failed.**"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
