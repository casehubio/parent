name: Build Status Dashboard

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  dashboard:
    name: Ecosystem Build Status
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Generate dashboard
        env:
          # A fine-grained PAT with "Actions: read" across the org is recommended.
          # Falls back to GITHUB_TOKEN for public repos.
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          ORG: casehubio
        run: |
          set -euo pipefail

          # Explicit ecosystem repo list — avoids demo/scratch repos polluting the dashboard
          REPOS=$(printf '%s\n' casehub-parent casehub-connectors engine ledger quarkus-work quarkus-qhorus claudony casehub-assisteddev)

          if [ -z "$REPOS" ]; then
            echo "::error::REPOS list is empty — check workflow configuration."
            exit 1
          fi

          {
            echo "# Build Status Dashboard"
            echo ""
            echo "_Org: **$ORG** &nbsp;|&nbsp; Updated: $(date -u '+%Y-%m-%d %H:%M UTC')_"
            echo ""
            echo "| Repository | Status | Workflow | Branch | Last run | Commit |"
            echo "|:-----------|:------:|:--------:|:------:|:--------:|:------:|"
          } >> "$GITHUB_STEP_SUMMARY"

          FAIL_COUNT=0
          NO_RUNS_COUNT=0
          PASS_COUNT=0

          while IFS= read -r repo; do
            # Check latest push-triggered run on main regardless of workflow name.
            # Filtering by workflow name misses repos that use different filenames
            # (e.g. engine uses maven.yml, not publish.yml).
            # Strip control chars (U+0000-U+001F except \n) before jq to handle
            # emoji/special chars in commit messages that break JSON parsing.
            RUN=$(gh api "/repos/$ORG/$repo/actions/runs?branch=main&event=push&per_page=1" \
              2>/dev/null \
              | tr -d '\000-\010\013-\037\177' \
              | jq -r '.workflow_runs[0] // empty' 2>/dev/null || true)

            if [ -z "$RUN" ]; then
              # No push runs on main yet — flag as warning, not silent skip
              NO_RUNS_COUNT=$((NO_RUNS_COUNT + 1))
              FAIL_COUNT=$((FAIL_COUNT + 1))
              echo "| [$repo](https://github.com/$ORG/$repo) | ⚠️ no runs | — | \`main\` | — | — |" \
                >> "$GITHUB_STEP_SUMMARY"
              continue
            fi

            conclusion=$(echo "$RUN"    | jq -r '.conclusion // "in_progress"')
            status=$(echo "$RUN"        | jq -r '.status // "unknown"')
            branch=$(echo "$RUN"        | jq -r '.head_branch // "?"')
            updated=$(echo "$RUN"       | jq -r '.updated_at // ""' | sed 's/T/ /; s/Z/ UTC/')
            sha=$(echo "$RUN"           | jq -r '.head_sha // ""' | cut -c1-7)
            run_url=$(echo "$RUN"       | jq -r '.html_url // ""')
            wf_name=$(echo "$RUN"       | jq -r '.name // "—"')

            if [ "$conclusion" = "success" ]; then
              icon="✅"
              PASS_COUNT=$((PASS_COUNT + 1))
            elif [ "$conclusion" = "failure" ] || [ "$conclusion" = "timed_out" ]; then
              icon="❌"
              FAIL_COUNT=$((FAIL_COUNT + 1))
            elif [ "$status" = "in_progress" ] || [ "$status" = "queued" ]; then
              icon="🔄"
            else
              icon="⚠️"
              FAIL_COUNT=$((FAIL_COUNT + 1))
            fi

            echo "| [$repo](https://github.com/$ORG/$repo) | [$icon $conclusion]($run_url) | $wf_name | \`$branch\` | $updated | \`$sha\` |" \
              >> "$GITHUB_STEP_SUMMARY"
          done <<< "$REPOS"

          {
            echo ""
            if [ "$FAIL_COUNT" -eq 0 ]; then
              echo "✅ **All $PASS_COUNT monitored builds are passing.**"
            else
              echo "❌ **$FAIL_COUNT build(s) failing or missing, $PASS_COUNT passing.**"
              [ "$NO_RUNS_COUNT" -gt 0 ] && echo "_($NO_RUNS_COUNT repo(s) have no push runs on main yet.)_"
            fi
            echo ""
            echo "---"
            echo ""
            echo "[▶ Run Full Stack Build](https://github.com/$ORG/casehub-parent/actions/workflows/full-stack-build.yml) — clones and builds the entire platform in dependency order."
          } >> "$GITHUB_STEP_SUMMARY"

          # Surface failures as a workflow-level error so the dashboard run goes red
          if [ "$FAIL_COUNT" -gt 0 ]; then
            echo "::error::$FAIL_COUNT build(s) in the $ORG org are failing or have no runs."
            exit 1
          fi
