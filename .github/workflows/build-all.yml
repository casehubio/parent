name: Build All

# Standalone orchestrator — always starts from root, evaluates the entire
# module graph. Complements the per-repo dispatch chain (which is reactive
# and fast) by providing a reproducible, SHA-keyed full-stack gate.
#
# Three decisions per module (same logic as build-all.sh):
#   BUILD — own SHA changed             → compile + test + install
#   TEST  — dep changed, source intact  → test only (artifact in .m2 is current)
#   SKIP  — nothing changed             → skip entirely

on:
  workflow_dispatch:
    inputs:
      skip_tests:
        description: "Skip all tests (BUILD still installs, TEST becomes SKIP)"
        type: boolean
        default: false
      skip_integration_tests:
        description: "Skip integration tests only"
        type: boolean
        default: false
      maven_args:
        description: "Extra Maven args (e.g. -T 1C)"
        type: string
        default: ''
      include_applications:
        description: "Include application repos (devtown, aml, clinical, drafthouse, life, quarkmind, flow) — off by default"
        type: boolean
        default: false
      force_rebuild:
        description: "Force full rebuild — ignore all cached state (equivalent to --no-cache)"
        type: boolean
        default: false

jobs:
  build:
    name: Build All
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Clone repositories
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          INCLUDE_APPLICATIONS: ${{ inputs.include_applications }}
        run: |
          mkdir -p .build-times casehub
          declare -A REPO_OVERRIDE=([pages]="casehubio/casehub-pages")
          declare -A TOKEN_OVERRIDE=([quarkmind]="$GH_TOKEN" [flow]="$GH_TOKEN")
          clone_csv() {
            local csv=$1
            while IFS=',' read -r name _rest; do
              [[ "$name" =~ ^#|^$ ]] && continue
              local token="${TOKEN_OVERRIDE[$name]:-$GITHUB_TOKEN}"
              local repo="${REPO_OVERRIDE[$name]:-casehubio/$name}"
              git clone "https://x-access-token:${token}@github.com/${repo}.git" "casehub/$name"
            done < "$csv"
          }
          clone_csv build/modules-core.csv
          if [ "$INCLUDE_APPLICATIONS" = "true" ]; then clone_csv build/modules-applications.csv; fi

      - name: Collect SHAs
        id: shas
        env:
          INCLUDE_APPLICATIONS: ${{ inputs.include_applications }}
        run: |
          mkdir -p .build-shas

          emit_sha() {
            local name=$1
            local sha=$(git -C "casehub/$name" rev-parse HEAD)
            local key="sha_$(echo "$name" | tr '-' '_')"
            echo "${key}=${sha}" >> $GITHUB_OUTPUT
            echo "${sha}" > ".build-shas/${name}"
            echo "${name}  ${sha}"
          }

          P=$(git rev-parse HEAD)
          echo "sha_parent=$P" >> $GITHUB_OUTPUT
          echo "$P" > .build-shas/parent

          echo "::group::SHA manifest (pin these to reproduce this build)"
          echo "parent  $P"

          while IFS=',' read -r name _rest; do
            [[ "$name" =~ ^#|^$ ]] && continue
            emit_sha "$name"
          done < build/modules-core.csv

          if [ "$INCLUDE_APPLICATIONS" = "true" ]; then
            while IFS=',' read -r name _rest; do
              [[ "$name" =~ ^#|^$ ]] && continue
              emit_sha "$name"
            done < build/modules-applications.csv
          fi

          echo "::endgroup::"

      # Restore state from last run on this branch.
      # Key includes run_id so each run writes its own entry; restore-keys
      # falls back to the most recent prior run on the same branch.
      - name: Restore build state
        uses: actions/cache/restore@v4
        with:
          path: .incremental-state
          key: incremental-state-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            incremental-state-${{ github.ref_name }}-

      - name: Load previous SHAs
        id: prev
        env:
          FORCE_REBUILD: ${{ inputs.force_rebuild }}
          INCLUDE_APPLICATIONS: ${{ inputs.include_applications }}
        run: |
          MODULES=(parent)
          while IFS=',' read -r name _rest; do
            [[ "$name" =~ ^#|^$ ]] && continue
            MODULES+=("$name")
          done < build/modules-core.csv
          if [ "$INCLUDE_APPLICATIONS" = "true" ]; then
            while IFS=',' read -r name _rest; do
              [[ "$name" =~ ^#|^$ ]] && continue
              MODULES+=("$name")
            done < build/modules-applications.csv
          fi

          mkdir -p .build-shas-prev

          if [ "$FORCE_REBUILD" = "true" ] || [ ! -f .incremental-state/shas.txt ]; then
            for m in "${MODULES[@]}"; do
              echo "sha_${m}=none" >> $GITHUB_OUTPUT
              echo "none" > ".build-shas-prev/${m}"
            done
          else
            while IFS='=' read -r key value; do
              echo "sha_${key}=${value}" >> $GITHUB_OUTPUT
              echo "${value}" > ".build-shas-prev/${key}"
            done < .incremental-state/shas.txt
            for m in "${MODULES[@]}"; do
              if ! grep -q "^${m}=" .incremental-state/shas.txt; then
                echo "sha_${m}=none" >> $GITHUB_OUTPUT
                echo "none" > ".build-shas-prev/${m}"
              fi
            done
          fi

      # Cache the compiled casehub artifacts between runs.
      # Full key covers all module SHAs — a hit means all artifacts are current → all SKIP.
      # Restore-key fallback gives us the most recent partial match — stale artifacts
      # are overwritten by whichever modules get BUILD/TEST decisions this run.
      - name: Restore Maven cache
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/io/casehub
          key: m2-casehub-${{ steps.shas.outputs.sha_parent }}-${{ steps.shas.outputs.sha_platform }}-${{ steps.shas.outputs.sha_ledger }}-${{ steps.shas.outputs.sha_eidos }}-${{ steps.shas.outputs.sha_connectors }}-${{ steps.shas.outputs.sha_work }}-${{ steps.shas.outputs.sha_qhorus }}-${{ steps.shas.outputs.sha_pages }}-${{ steps.shas.outputs.sha_engine }}-${{ steps.shas.outputs.sha_claudony }}
          restore-keys: |
            m2-casehub-

      # Always install the parent POM — it's lightweight and ensures .m2 has the
      # current version regardless of cache state.
      - name: Install parent POM
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mvn install -N --batch-mode -q

      # ── Module builds ────────────────────────────────────────────────────────
      #
      # Each step:
      #   1. Calls the decision script with own SHA, previous SHA, and dep SHAs
      #   2. Outputs the decision (BUILD/TEST/SKIP) for the summary
      #   3. Executes: BUILD→mvn install, TEST→mvn test (or SKIP if tests disabled),
      #      SKIP→nothing
      #
      # Parent SHA is passed as a dep to every module — if parent changes,
      # all modules get at least TEST.
      #
      # continue-on-error: true so all modules run and we get a complete summary.

      # -- BEGIN GENERATED

      - name: "Build: platform"
        id: platform
        continue-on-error: true
        env:
          CUR: ${{ steps.shas.outputs.sha_platform }}
          PRV: ${{ steps.prev.outputs.sha_platform }}
          CUR_PARENT: ${{ steps.shas.outputs.sha_parent }}
          PRV_PARENT: ${{ steps.prev.outputs.sha_parent }}
          SKIP_TESTS: ${{ inputs.skip_tests }}
          SKIP_ITS: ${{ inputs.skip_integration_tests }}
          MAVEN_EXTRA: ${{ inputs.maven_args }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p .build-outcomes .build-decisions
          D=$(./scripts/build-all-decision.sh \
            --module platform --current-sha "$CUR" --previous-sha "${PRV:-none}" \
            --dep "parent:${CUR_PARENT}:${PRV_PARENT:-none}")
          echo "decision=$D" >> $GITHUB_OUTPUT
          echo "$D" > .build-decisions/platform
          START=$SECONDS
          RC=0
          case "$D" in
            SKIP) echo "⏭️  platform: SKIP" ;;
            TEST)
              if [ "$SKIP_TESTS" = "true" ]; then echo "⏭️  platform: SKIP (TEST — tests disabled)"
              else
                ITS=""; [ "$SKIP_ITS" = "true" ] && ITS="-DskipITs"
                cd casehub/platform && mvn test --batch-mode $ITS $MAVEN_EXTRA || RC=$?
              fi ;;
            BUILD)
              F=""; [ "$SKIP_TESTS" = "true" ] && F="-DskipTests"
              [ "$SKIP_ITS" = "true" ] && F="$F -DskipITs"
              cd casehub/platform && mvn install --batch-mode $F $MAVEN_EXTRA || RC=$? ;;
          esac
          [ $RC -eq 0 ] && echo "success" > .build-outcomes/platform || echo "failure" > .build-outcomes/platform
          echo $((SECONDS - START)) > .build-times/platform

      - name: "Build: ledger"
        id: ledger
        continue-on-error: true
        env:
          CUR: ${{ steps.shas.outputs.sha_ledger }}
          PRV: ${{ steps.prev.outputs.sha_ledger }}
          CUR_PARENT: ${{ steps.shas.outputs.sha_parent }}
          PRV_PARENT: ${{ steps.prev.outputs.sha_parent }}
          SKIP_TESTS: ${{ inputs.skip_tests }}
          SKIP_ITS: ${{ inputs.skip_integration_tests }}
          MAVEN_EXTRA: ${{ inputs.maven_args }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p .build-outcomes .build-decisions
          D=$(./scripts/build-all-decision.sh \
            --module ledger --current-sha "$CUR" --previous-sha "${PRV:-none}" \
            --dep "parent:${CUR_PARENT}:${PRV_PARENT:-none}")
          echo "decision=$D" >> $GITHUB_OUTPUT
          echo "$D" > .build-decisions/ledger
          START=$SECONDS
          RC=0
          case "$D" in
            SKIP) echo "⏭️  ledger: SKIP" ;;
            TEST)
              if [ "$SKIP_TESTS" = "true" ]; then echo "⏭️  ledger: SKIP (TEST — tests disabled)"
              else
                ITS=""; [ "$SKIP_ITS" = "true" ] && ITS="-DskipITs"
                cd casehub/ledger && mvn test --batch-mode $ITS $MAVEN_EXTRA || RC=$?
              fi ;;
            BUILD)
              F=""; [ "$SKIP_TESTS" = "true" ] && F="-DskipTests"
              [ "$SKIP_ITS" = "true" ] && F="$F -DskipITs"
              cd casehub/ledger && mvn install --batch-mode $F $MAVEN_EXTRA || RC=$? ;;
          esac
          [ $RC -eq 0 ] && echo "success" > .build-outcomes/ledger || echo "failure" > .build-outcomes/ledger
          echo $((SECONDS - START)) > .build-times/ledger

      - name: "Build: eidos"
        id: eidos
        continue-on-error: true
        env:
          CUR: ${{ steps.shas.outputs.sha_eidos }}
          PRV: ${{ steps.prev.outputs.sha_eidos }}
          CUR_LEDGER: ${{ steps.shas.outputs.sha_ledger }}
          PRV_LEDGER: ${{ steps.prev.outputs.sha_ledger }}
          SKIP_TESTS: ${{ inputs.skip_tests }}
          SKIP_ITS: ${{ inputs.skip_integration_tests }}
          MAVEN_EXTRA: ${{ inputs.maven_args }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p .build-outcomes .build-decisions
          D=$(./scripts/build-all-decision.sh \
            --module eidos --current-sha "$CUR" --previous-sha "${PRV:-none}" \
            --dep "ledger:${CUR_LEDGER}:${PRV_LEDGER:-none}")
          echo "decision=$D" >> $GITHUB_OUTPUT
          echo "$D" > .build-decisions/eidos
          START=$SECONDS
          RC=0
          case "$D" in
            SKIP) echo "⏭️  eidos: SKIP" ;;
            TEST)
              if [ "$SKIP_TESTS" = "true" ]; then echo "⏭️  eidos: SKIP (TEST — tests disabled)"
              else
                ITS=""; [ "$SKIP_ITS" = "true" ] && ITS="-DskipITs"
                cd casehub/eidos && mvn test --batch-mode $ITS $MAVEN_EXTRA || RC=$?
              fi ;;
            BUILD)
              F=""; [ "$SKIP_TESTS" = "true" ] && F="-DskipTests"
              [ "$SKIP_ITS" = "true" ] && F="$F -DskipITs"
              cd casehub/eidos && mvn install --batch-mode $F $MAVEN_EXTRA || RC=$? ;;
          esac
          [ $RC -eq 0 ] && echo "success" > .build-outcomes/eidos || echo "failure" > .build-outcomes/eidos
          echo $((SECONDS - START)) > .build-times/eidos

      - name: "Build: neural-text"
        id: neural-text
        continue-on-error: true
        env:
          CUR: ${{ steps.shas.outputs.sha_neural_text }}
          PRV: ${{ steps.prev.outputs.sha_neural_text }}
          CUR_PLATFORM: ${{ steps.shas.outputs.sha_platform }}
          PRV_PLATFORM: ${{ steps.prev.outputs.sha_platform }}
          SKIP_TESTS: ${{ inputs.skip_tests }}
          SKIP_ITS: ${{ inputs.skip_integration_tests }}
          MAVEN_EXTRA: ${{ inputs.maven_args }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p .build-outcomes .build-decisions
          D=$(./scripts/build-all-decision.sh \
            --module neural-text --current-sha "$CUR" --previous-sha "${PRV:-none}" \
            --dep "platform:${CUR_PLATFORM}:${PRV_PLATFORM:-none}")
          echo "decision=$D" >> $GITHUB_OUTPUT
          echo "$D" > .build-decisions/neural-text
          START=$SECONDS
          RC=0
          case "$D" in
            SKIP) echo "⏭️  neural-text: SKIP" ;;
            TEST)
              if [ "$SKIP_TESTS" = "true" ]; then echo "⏭️  neural-text: SKIP (TEST — tests disabled)"
              else
                ITS=""; [ "$SKIP_ITS" = "true" ] && ITS="-DskipITs"
                cd casehub/neural-text && mvn test --batch-mode $ITS $MAVEN_EXTRA || RC=$?
              fi ;;
            BUILD)
              F=""; [ "$SKIP_TESTS" = "true" ] && F="-DskipTests"
              [ "$SKIP_ITS" = "true" ] && F="$F -DskipITs"
              cd casehub/neural-text && mvn install --batch-mode $F $MAVEN_EXTRA || RC=$? ;;
          esac
          [ $RC -eq 0 ] && echo "success" > .build-outcomes/neural-text || echo "failure" > .build-outcomes/neural-text
          echo $((SECONDS - START)) > .build-times/neural-text

      - name: "Build: connectors"
        id: connectors
        continue-on-error: true
        env:
          CUR: ${{ steps.shas.outputs.sha_connectors }}
          PRV: ${{ steps.prev.outputs.sha_connectors }}
          CUR_PARENT: ${{ steps.shas.outputs.sha_parent }}
          PRV_PARENT: ${{ steps.prev.outputs.sha_parent }}
          SKIP_TESTS: ${{ inputs.skip_tests }}
          SKIP_ITS: ${{ inputs.skip_integration_tests }}
          MAVEN_EXTRA: ${{ inputs.maven_args }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p .build-outcomes .build-decisions
          D=$(./scripts/build-all-decision.sh \
            --module connectors --current-sha "$CUR" --previous-sha "${PRV:-none}" \
            --dep "parent:${CUR_PARENT}:${PRV_PARENT:-none}")
          echo "decision=$D" >> $GITHUB_OUTPUT
          echo "$D" > .build-decisions/connectors
          START=$SECONDS
          RC=0
          case "$D" in
            SKIP) echo "⏭️  connectors: SKIP" ;;
            TEST)
              if [ "$SKIP_TESTS" = "true" ]; then echo "⏭️  connectors: SKIP (TEST — tests disabled)"
              else
                ITS=""; [ "$SKIP_ITS" = "true" ] && ITS="-DskipITs"
                cd casehub/connectors && mvn test --batch-mode $ITS $MAVEN_EXTRA || RC=$?
              fi ;;
            BUILD)
              F=""; [ "$SKIP_TESTS" = "true" ] && F="-DskipTests"
              [ "$SKIP_ITS" = "true" ] && F="$F -DskipITs"
              cd casehub/connectors && mvn install --batch-mode $F $MAVEN_EXTRA || RC=$? ;;
          esac
          [ $RC -eq 0 ] && echo "success" > .build-outcomes/connectors || echo "failure" > .build-outcomes/connectors
          echo $((SECONDS - START)) > .build-times/connectors

      - name: "Build: work"
        id: work
        continue-on-error: true
        env:
          CUR: ${{ steps.shas.outputs.sha_work }}
          PRV: ${{ steps.prev.outputs.sha_work }}
          CUR_PARENT: ${{ steps.shas.outputs.sha_parent }}
          PRV_PARENT: ${{ steps.prev.outputs.sha_parent }}
          CUR_LEDGER: ${{ steps.shas.outputs.sha_ledger }}
          PRV_LEDGER: ${{ steps.prev.outputs.sha_ledger }}
          CUR_CONNECTORS: ${{ steps.shas.outputs.sha_connectors }}
          PRV_CONNECTORS: ${{ steps.prev.outputs.sha_connectors }}
          SKIP_TESTS: ${{ inputs.skip_tests }}
          SKIP_ITS: ${{ inputs.skip_integration_tests }}
          MAVEN_EXTRA: ${{ inputs.maven_args }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p .build-outcomes .build-decisions
          D=$(./scripts/build-all-decision.sh \
            --module work --current-sha "$CUR" --previous-sha "${PRV:-none}" \
            --dep "parent:${CUR_PARENT}:${PRV_PARENT:-none}" \
            --dep "ledger:${CUR_LEDGER}:${PRV_LEDGER:-none}" \
            --dep "connectors:${CUR_CONNECTORS}:${PRV_CONNECTORS:-none}")
          echo "decision=$D" >> $GITHUB_OUTPUT
          echo "$D" > .build-decisions/work
          START=$SECONDS
          RC=0
          case "$D" in
            SKIP) echo "⏭️  work: SKIP" ;;
            TEST)
              if [ "$SKIP_TESTS" = "true" ]; then echo "⏭️  work: SKIP (TEST — tests disabled)"
              else
                ITS=""; [ "$SKIP_ITS" = "true" ] && ITS="-DskipITs"
                cd casehub/work && mvn test --batch-mode $ITS $MAVEN_EXTRA || RC=$?
              fi ;;
            BUILD)
              F=""; [ "$SKIP_TESTS" = "true" ] && F="-DskipTests"
              [ "$SKIP_ITS" = "true" ] && F="$F -DskipITs"
              cd casehub/work && mvn install --batch-mode $F $MAVEN_EXTRA || RC=$? ;;
          esac
          [ $RC -eq 0 ] && echo "success" > .build-outcomes/work || echo "failure" > .build-outcomes/work
          echo $((SECONDS - START)) > .build-times/work

      - name: "Build: qhorus"
        id: qhorus
        continue-on-error: true
        env:
          CUR: ${{ steps.shas.outputs.sha_qhorus }}
          PRV: ${{ steps.prev.outputs.sha_qhorus }}
          CUR_PARENT: ${{ steps.shas.outputs.sha_parent }}
          PRV_PARENT: ${{ steps.prev.outputs.sha_parent }}
          CUR_LEDGER: ${{ steps.shas.outputs.sha_ledger }}
          PRV_LEDGER: ${{ steps.prev.outputs.sha_ledger }}
          CUR_WORK: ${{ steps.shas.outputs.sha_work }}
          PRV_WORK: ${{ steps.prev.outputs.sha_work }}
          SKIP_TESTS: ${{ inputs.skip_tests }}
          SKIP_ITS: ${{ inputs.skip_integration_tests }}
          MAVEN_EXTRA: ${{ inputs.maven_args }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p .build-outcomes .build-decisions
          D=$(./scripts/build-all-decision.sh \
            --module qhorus --current-sha "$CUR" --previous-sha "${PRV:-none}" \
            --dep "parent:${CUR_PARENT}:${PRV_PARENT:-none}" \
            --dep "ledger:${CUR_LEDGER}:${PRV_LEDGER:-none}" \
            --dep "work:${CUR_WORK}:${PRV_WORK:-none}")
          echo "decision=$D" >> $GITHUB_OUTPUT
          echo "$D" > .build-decisions/qhorus
          START=$SECONDS
