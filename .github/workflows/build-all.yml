      # -- END GENERATED

      # ── State persistence ─────────────────────────────────────────────────
      #
      # Records the SHA for each module that succeeded (or was SKIPped, meaning
      # its cached artifact is still valid). Failed modules keep their previous
      # SHA so the next run retries them.

      - name: Save build state
        if: always()
        env:
          INCLUDE_APPLICATIONS: ${{ inputs.include_applications }}
        run: |
          mkdir -p .incremental-state

          # On success record current SHA; on failure keep previous SHA so next run retries.
          record() {
            local name=$1
            local cur=$(cat ".build-shas/${name}" 2>/dev/null || echo "none")
            local prev=$(cat ".build-shas-prev/${name}" 2>/dev/null || echo "none")
            local outcome=$(cat ".build-outcomes/${name}" 2>/dev/null || echo "skipped")
            if [ "$outcome" = "success" ]; then echo "${name}=${cur}"
            else echo "${name}=${prev}"
            fi
          }

          {
            echo "parent=$(cat .build-shas/parent 2>/dev/null || echo none)"
            while IFS=',' read -r name _rest; do
              [[ "$name" =~ ^#|^$ ]] && continue
              record "$name"
            done < build/modules-core.csv
            if [ "$INCLUDE_APPLICATIONS" = "true" ]; then
              while IFS=',' read -r name _rest; do
                [[ "$name" =~ ^#|^$ ]] && continue
                record "$name"
              done < build/modules-applications.csv
            fi
          } > .incremental-state/shas.txt

          echo "State saved:"
          cat .incremental-state/shas.txt

      - name: Persist build state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .incremental-state
          key: incremental-state-${{ github.ref_name }}-${{ github.run_id }}

      # ── Summary ───────────────────────────────────────────────────────────

      - name: Build summary
        if: always()
        env:
          ACTOR: ${{ github.actor }}
          SKIP_TESTS: ${{ inputs.skip_tests }}
          SKIP_ITS: ${{ inputs.skip_integration_tests }}
          FORCE_REBUILD: ${{ inputs.force_rebuild }}
          INCLUDE_APPLICATIONS: ${{ inputs.include_applications }}
        run: |
          if [ "$SKIP_TESTS" = "true" ]; then
            TEST_MODE="compile check only"
          elif [ "$SKIP_ITS" = "true" ]; then
            TEST_MODE="unit tests only"
          else
            TEST_MODE="full test suite"
          fi
          [ "$FORCE_REBUILD" = "true" ] && TEST_MODE="$TEST_MODE — forced rebuild"

          declare -A ORG_OVERRIDE=([quarkmind]="mdproctor" [flow]="mdproctor")

          # Module list, outcomes, and decisions all driven from CSV + files written by each step
          MODULES=()
          read_csv_names() {
            while IFS=',' read -r name _rest; do
              [[ "$name" =~ ^#|^$ ]] && continue
              MODULES+=("$name")
            done < "$1"
          }
          read_csv_names build/modules-core.csv
          if [ "$INCLUDE_APPLICATIONS" = "true" ]; then read_csv_names build/modules-applications.csv; fi

          {
            echo "# Build All"
            echo ""
            echo "_Triggered by @${ACTOR} &nbsp;|&nbsp; $(date -u '+%Y-%m-%d %H:%M UTC') &nbsp;|&nbsp; ${TEST_MODE}_"
            echo ""
            echo "| Module | Decision | Result | Duration |"
            echo "|:-------|:--------:|:------:|:--------:|"
          } >> "$GITHUB_STEP_SUMMARY"

          FAIL_COUNT=0
          for module in "${MODULES[@]}"; do
            decision=$(cat ".build-decisions/$module" 2>/dev/null || echo "—")
            outcome=$(cat ".build-outcomes/$module" 2>/dev/null || echo "skipped")
            duration=$(cat ".build-times/$module" 2>/dev/null || true)
            [ -n "$duration" ] && duration="${duration}s" || duration="—"

            case "$outcome" in
              success)  icon="✅" ;;
              failure)  icon="❌"; FAIL_COUNT=$((FAIL_COUNT + 1)) ;;
              *)        icon="⏭️" ;;
            esac

            repo_org="${ORG_OVERRIDE[$module]:-casehubio}"
            echo "| [$module](https://github.com/$repo_org/$module) | $decision | $icon | $duration |" \
              >> "$GITHUB_STEP_SUMMARY"
          done

          {
            echo ""
            if [ "$FAIL_COUNT" -eq 0 ]; then
              echo "✅ **All modules passed.**"
            else
              echo "❌ **$FAIL_COUNT module(s) failed.**"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$FAIL_COUNT" -gt 0 ]; then
            echo "::error::$FAIL_COUNT module(s) failed in the build-all."
            exit 1
          fi
