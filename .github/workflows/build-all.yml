                cd casehub/qhorus && mvn test --batch-mode $ITS $MAVEN_EXTRA || RC=$?
              fi ;;
            BUILD)
              F=""; [ "$SKIP_TESTS" = "true" ] && F="-DskipTests"
              [ "$SKIP_ITS" = "true" ] && F="$F -DskipITs"
              cd casehub/qhorus && mvn install --batch-mode $F $MAVEN_EXTRA || RC=$? ;;
          esac
