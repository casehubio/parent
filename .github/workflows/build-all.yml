            TEST)
              if [ "$SKIP_TESTS" = "true" ]; then echo "⏭️  engine: SKIP (TEST — tests disabled)"
              else
                ITS=""; [ "$SKIP_ITS" = "true" ] && ITS="-DskipITs"
                cd casehub/engine && mvn test --batch-mode $ITS $MAVEN_EXTRA || RC=$?
              fi ;;
            BUILD)
              F=""; [ "$SKIP_TESTS" = "true" ] && F="-DskipTests"
              [ "$SKIP_ITS" = "true" ] && F="$F -DskipITs"
              cd casehub/engine && mvn install --batch-mode $F $MAVEN_EXTRA || RC=$? ;;
          esac
          [ $RC -eq 0 ] && echo "success" > .build-outcomes/engine || echo "failure" > .build-outcomes/engine
          echo $((SECONDS - START)) > .build-times/engine

      - name: "Build: claudony"
        id: claudony
        continue-on-error: true
        env:
          CUR: ${{ steps.shas.outputs.sha_claudony }}
          PRV: ${{ steps.prev.outputs.sha_claudony }}
          CUR_PARENT: ${{ steps.shas.outputs.sha_parent }}
          PRV_PARENT: ${{ steps.prev.outputs.sha_parent }}
          CUR_LEDGER: ${{ steps.shas.outputs.sha_ledger }}
          PRV_LEDGER: ${{ steps.prev.outputs.sha_ledger }}
          CUR_WORK: ${{ steps.shas.outputs.sha_work }}
          PRV_WORK: ${{ steps.prev.outputs.sha_work }}
          CUR_QHORUS: ${{ steps.shas.outputs.sha_qhorus }}
          PRV_QHORUS: ${{ steps.prev.outputs.sha_qhorus }}
          SKIP_TESTS: ${{ inputs.skip_tests }}
          SKIP_ITS: ${{ inputs.skip_integration_tests }}
          MAVEN_EXTRA: ${{ inputs.maven_args }}
