          echo $((SECONDS - START)) > .build-times/qhorus

      - name: "Build: pages"
        id: pages
        continue-on-error: true
        env:
          CUR: ${{ steps.shas.outputs.sha_pages }}
          PRV: ${{ steps.prev.outputs.sha_pages }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p .build-outcomes .build-decisions
          D=$(./scripts/build-all-decision.sh \
            --module pages --current-sha "$CUR" --previous-sha "${PRV:-none}")
          echo "decision=$D" >> $GITHUB_OUTPUT
          echo "$D" > .build-decisions/pages
          START=$SECONDS
          RC=0
          case "$D" in
            SKIP) echo "⏭️  pages: SKIP" ;;
            TEST) echo "⏭️  pages: SKIP (yarn-only, no separate test phase)" ;;
            BUILD) cd casehub/pages && yarn install && yarn build || RC=$? ;;
          esac
          [ $RC -eq 0 ] && echo "success" > .build-outcomes/pages || echo "failure" > .build-outcomes/pages
          echo $((SECONDS - START)) > .build-times/pages

      - name: "Build: engine"
        id: engine
        continue-on-error: true
        env:
          CUR: ${{ steps.shas.outputs.sha_engine }}
          PRV: ${{ steps.prev.outputs.sha_engine }}
          CUR_PARENT: ${{ steps.shas.outputs.sha_parent }}
          PRV_PARENT: ${{ steps.prev.outputs.sha_parent }}
          CUR_LEDGER: ${{ steps.shas.outputs.sha_ledger }}
          PRV_LEDGER: ${{ steps.prev.outputs.sha_ledger }}
          CUR_WORK: ${{ steps.shas.outputs.sha_work }}
          PRV_WORK: ${{ steps.prev.outputs.sha_work }}
          SKIP_TESTS: ${{ inputs.skip_tests }}
          SKIP_ITS: ${{ inputs.skip_integration_tests }}
          MAVEN_EXTRA: ${{ inputs.maven_args }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p .build-outcomes .build-decisions
          D=$(./scripts/build-all-decision.sh \
            --module engine --current-sha "$CUR" --previous-sha "${PRV:-none}" \
            --dep "parent:${CUR_PARENT}:${PRV_PARENT:-none}" \
            --dep "ledger:${CUR_LEDGER}:${PRV_LEDGER:-none}" \
            --dep "work:${CUR_WORK}:${PRV_WORK:-none}")
          echo "decision=$D" >> $GITHUB_OUTPUT
          echo "$D" > .build-decisions/engine
          START=$SECONDS
          RC=0
          case "$D" in
